apiVersion: apps/v1
kind: Deployment
metadata:
  name: miku-rpc-auth
  labels:
    app: miku
    svc: rpc-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miku
      svc: rpc-auth
  template:
    metadata:
      labels:
        app: miku
        svc: rpc-auth
    spec:
      containers:
        - name: miku-rpc-auth
          image: miku:latest
          command: ["miku-rpc-auth"]
          args: ["-c", "/etc/miku"]
          ports:
            - containerPort: 10100
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits:   { cpu: "1", memory: 128Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/miku
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: miku-config
---
apiVersion: v1
kind: Service
metadata:
  name: miku-rpc-auth
spec:
  type: ClusterIP
  selector:
    app: miku
    svc: rpc-auth
  ports:
    - port: 10100
      targetPort: 10100
---
