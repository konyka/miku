openapi: 3.0.3
info:
  title: Miku IM Server API
  version: 0.1.0
  description: High-performance IM server API - pure C rewrite of OpenIM Server with 203 routes
  contact:
    name: Miku IM
    url: https://github.com/konyka/miku

servers:
  - url: http://localhost:10002
    description: Local development

security: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: User
    description: User account management
  - name: Friend
    description: Friend relationship management
  - name: Group
    description: Group chat management
  - name: Message
    description: Message sending and retrieval
  - name: Conversation
    description: Conversation management
  - name: Third
    description: Third-party services (file upload/download)
  - name: Object
    description: Object storage (S3-compatible)
  - name: Batch
    description: Batch operations
  - name: Admin
    description: Administrative endpoints
  - name: Statistics
    description: Usage statistics
  - name: JSSDK
    description: JavaScript SDK aggregation endpoints
  - name: PrometheusDiscovery
    description: Prometheus service discovery endpoints
  - name: Config
    description: Runtime configuration management

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: token

  schemas:
    ErrorResponse:
      type: object
      properties:
        errCode:
          type: integer
        errMsg:
          type: string
        errDmg:
          type: string
      required: [errCode]

    UserInfo:
      type: object
      properties:
        userID:
          type: string
        nickname:
          type: string
        faceURL:
          type: string
        ex:
          type: string
        createTime:
          type: integer
          format: int64
        appManagerLevel:
          type: integer
        globalRecvMsgOpt:
          type: integer

    FriendInfo:
      type: object
      properties:
        ownerUserID:
          type: string
        friendUserID:
          type: string
        remark:
          type: string
        createTime:
          type: integer
          format: int64
        addSource:
          type: integer
        nickname:
          type: string
        faceURL:
          type: string
        ex:
          type: string

    GroupInfo:
      type: object
      properties:
        groupID:
          type: string
        groupName:
          type: string
        notification:
          type: string
        introduction:
          type: string
        faceURL:
          type: string
        ownerUserID:
          type: string
        createTime:
          type: integer
          format: int64
        memberCount:
          type: integer
        status:
          type: integer
        ex:
          type: string

    MsgData:
      type: object
      properties:
        sendID:
          type: string
        recvID:
          type: string
        content:
          type: string
        contentType:
          type: integer
        sessionType:
          type: integer
        clientMsgID:
          type: string
        createTime:
          type: integer
          format: int64
        sendTime:
          type: integer
          format: int64
        status:
          type: integer
        isRead:
          type: integer
        seq:
          type: integer
          format: int64

    ConversationInfo:
      type: object
      properties:
        conversationID:
          type: string
        conversationType:
          type: integer
        userID:
          type: string
        groupID:
          type: string
        showName:
          type: string
        faceURL:
          type: string
        recvMsgOpt:
          type: integer
        unreadCount:
          type: integer
        latestMsg:
          type: string
        latestMsgSendTime:
          type: integer
          format: int64
        draftText:
          type: string
        isPinned:
          type: boolean
        isPrivateChat:
          type: boolean
        ex:
          type: string

