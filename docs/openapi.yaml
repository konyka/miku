openapi: 3.0.3
info:
  title: Miku IM Server API
  version: 0.1.0
  description: High-performance IM server API — pure C rewrite of OpenIM Server
  contact:
    name: Miku IM
    url: https://github.com/konyka/miku

servers:
  - url: http://localhost:10002
    description: Local development

security: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: User
    description: User account management
  - name: Friend
    description: Friend relationship management
  - name: Group
    description: Group chat management
  - name: Message
    description: Message sending and retrieval
  - name: Conversation
    description: Conversation management
  - name: Third
    description: Third-party services (file upload/download)
  - name: Batch
    description: Batch operations
  - name: Admin
    description: Administrative endpoints

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: token

  schemas:
    ErrorResponse:
      type: object
      properties:
        errCode:
          type: integer
          description: Error code (0 = success)
        errMsg:
          type: string
          description: Error message
        errDmg:
          type: string
          description: Detailed error message
      required: [errCode]

    UserInfo:
      type: object
      properties:
        userID:
          type: string
        nickname:
          type: string
        faceURL:
          type: string
        ex:
          type: string
        createTime:
          type: integer
          format: int64
        appManagerLevel:
          type: integer
        globalRecvMsgOpt:
          type: integer

    FriendInfo:
      type: object
      properties:
        ownerUserID:
          type: string
        friendUserID:
          type: string
        remark:
          type: string
        createTime:
          type: integer
          format: int64
        addSource:
          type: integer
        nickname:
          type: string
        faceURL:
          type: string
        ex:
          type: string

    GroupInfo:
      type: object
      properties:
        groupID:
          type: string
        groupName:
          type: string
        notification:
          type: string
        introduction:
          type: string
        faceURL:
          type: string
        ownerUserID:
          type: string
        createTime:
          type: integer
          format: int64
        memberCount:
          type: integer
        status:
          type: integer
        creator:
          type: string
        groupType:
          type: integer
        ex:
          type: string

    GroupMemberInfo:
      type: object
      properties:
        groupID:
          type: string
        userID:
          type: string
        nickname:
          type: string
        faceURL:
          type: string
        roleLevel:
          type: integer
        joinTime:
          type: integer
          format: int64
        joinSource:
          type: integer
        ex:
          type: string

    MsgData:
      type: object
      properties:
        sendID:
          type: string
        recvID:
          type: string
        groupID:
          type: string
        clientMsgID:
          type: string
        serverMsgID:
          type: string
        senderPlatformID:
          type: integer
        senderNickname:
          type: string
        senderFaceURL:
          type: string
        contentType:
          type: integer
        content:
          type: string
        seq:
          type: integer
          format: int64
        sendTime:
          type: integer
          format: int64
        createTime:
          type: integer
          format: int64
        status:
          type: integer
        isRead:
          type: boolean
        conversationType:
          type: integer

    ConversationInfo:
      type: object
      properties:
        conversationID:
          type: string
        conversationType:
          type: integer
        userID:
          type: string
        groupID:
          type: string
        showName:
          type: string
        faceURL:
          type: string
        recvMsgOpt:
          type: integer
        unreadCount:
          type: integer
          format: int64
        latestMsg:
          type: string
        isPinned:
          type: boolean
        isPrivateChat:
          type: boolean
        ex:
          type: string

    Pagination:
      type: object
      properties:
        pageNumber:
          type: integer
        showNumber:
          type: integer

paths:
  /auth/user_token:
    post:
      tags: [Auth]
      summary: Generate user token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userID, secret, platformID]
              properties:
                userID:
                  type: string
                secret:
                  type: string
                platformID:
                  type: integer
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  token:
                    type: string
                  expireTimeSeconds:
                    type: integer

  /auth/parse_token:
    post:
      tags: [Auth]
      summary: Parse and validate token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Parsed token info
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  userID:
                    type: string
                  platform:
                    type: string

  /auth/admin_token:
    post:
      tags: [Auth]
      summary: Generate admin token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userID, secret]
              properties:
                userID:
                  type: string
                secret:
                  type: string
      responses:
        "200":
          description: Admin token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  token:
                    type: string
                  expireTimeSeconds:
                    type: integer

  /auth/force_logout:
    post:
      tags: [Auth]
      summary: Force user logout on specific platform
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userID, platformID]
              properties:
                userID:
                  type: string
                platformID:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/force_logout_all:
    post:
      tags: [Auth]
      summary: Force user logout on all platforms
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userID]
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/register:
    post:
      tags: [User]
      summary: Register new user
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userID]
              properties:
                userID:
                  type: string
                nickname:
                  type: string
                faceURL:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/get_users_info:
    post:
      tags: [User]
      summary: Get user info by ID list
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIDList]
              properties:
                userIDList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserInfo"

  /user/update_user_info:
    post:
      tags: [User]
      summary: Update user profile
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                nickname:
                  type: string
                faceURL:
                  type: string
                ex:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/account_check:
    post:
      tags: [User]
      summary: Check account existence
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIDList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object

  /user/get_all_users:
    post:
      tags: [User]
      summary: Get all users
      security: [{tokenAuth: []}]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserInfo"

  /user/count:
    post:
      tags: [User]
      summary: Get total user count
      security: [{tokenAuth: []}]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: User count
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  count:
                    type: integer

  /user/search:
    post:
      tags: [User]
      summary: Search users
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                pagination:
                  $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserInfo"

  /user/get_users_online_status:
    post:
      tags: [User]
      summary: Get online status for users
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIDList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Online status list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  statusList:
                    type: array
                    items:
                      type: object

  /user/set_global_recv_opt:
    post:
      tags: [User]
      summary: Set global message receive option
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                globalRecvMsgOpt:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/get_global_recv_opt:
    post:
      tags: [User]
      summary: Get global message receive option
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: Global receive option
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  globalRecvMsgOpt:
                    type: integer

  /user/update_user_status:
    post:
      tags: [User]
      summary: Update user online status
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                status:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/process_user_command:
    post:
      tags: [User]
      summary: Process user command
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                type:
                  type: integer
                uuid:
                  type: string
                value:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/get_user_status:
    post:
      tags: [User]
      summary: Get user status
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: User status
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  status:
                    type: integer

  /user/get_subscribe_users_status:
    post:
      tags: [User]
      summary: Get subscribed users status
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: Status list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  statusList:
                    type: array
                    items:
                      type: object

  /user/subscribe_or_cancel_user_status:
    post:
      tags: [User]
      summary: Subscribe or cancel user status
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                userIDList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/set_user_status:
    post:
      tags: [User]
      summary: Set user status
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                status:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/add:
    post:
      tags: [Friend]
      summary: Add friend request
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromUserID, toUserID]
              properties:
                fromUserID:
                  type: string
                toUserID:
                  type: string
                reqMsg:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/delete:
    post:
      tags: [Friend]
      summary: Delete friend
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ownerUserID, friendUserID]
              properties:
                ownerUserID:
                  type: string
                friendUserID:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/get_friend_list:
    post:
      tags: [Friend]
      summary: Get friend list
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                pagination:
                  $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          description: Friend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  friendInfoList:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendInfo"

  /friend/is_friend:
    post:
      tags: [Friend]
      summary: Check friendship
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID1:
                  type: string
                userID2:
                  type: string
      responses:
        "200":
          description: Friendship check
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  isFriend:
                    type: boolean

  /friend/add_black:
    post:
      tags: [Friend]
      summary: Add to blacklist
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerUserID:
                  type: string
                blackUserID:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/remove_black:
    post:
      tags: [Friend]
      summary: Remove from blacklist
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerUserID:
                  type: string
                blackUserID:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/get_black_list:
    post:
      tags: [Friend]
      summary: Get blacklist
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: Blacklist
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  blackList:
                    type: array
                    items:
                      type: object

  /friend/delete_friend:
    post:
      tags: [Friend]
      summary: Delete friend (alternative endpoint)
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerUserID:
                  type: string
                friendUserID:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/get_friend_apply_list:
    post:
      tags: [Friend]
      summary: Get received friend requests
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                pagination:
                  $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          description: Friend requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  friendRequests:
                    type: array
                    items:
                      type: object

  /friend/get_self_apply_list:
    post:
      tags: [Friend]
      summary: Get sent friend requests
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                pagination:
                  $ref: "#/components/schemas/Pagination"
      responses:
        "200":
          description: Friend requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  friendRequests:
                    type: array
                    items:
                      type: object

  /friend/get_designated_apply:
    post:
      tags: [Friend]
      summary: Get specific friend request
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromUserID:
                  type: string
                toUserID:
                  type: string
      responses:
        "200":
          description: Friend request detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  friendRequest:
                    type: object

  /friend/accept_apply:
    post:
      tags: [Friend]
      summary: Accept friend request
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromUserID:
                  type: string
                toUserID:
                  type: string
                handleMsg:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/refuse_apply:
    post:
      tags: [Friend]
      summary: Refuse friend request
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromUserID:
                  type: string
                toUserID:
                  type: string
                handleMsg:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friend/sync_friend:
    post:
      tags: [Friend]
      summary: Sync friend list
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
      responses:
        "200":
          description: Friend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  friendList:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendInfo"

  /friend/import_friend:
    post:
      tags: [Friend]
      summary: Import friends
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerUserID:
                  type: string
                friendUserList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /group/create:
    post:
      tags: [Group]
      summary: Create group
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupInfo:
                  $ref: "#/components/schemas/GroupInfo"
                memberList:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Created group
          content:
            application/json:
              schema:
                type: object
                properties:
                  errCode:
                    type: integer
                  groupInfo:
                    $ref: "#/components/schemas/GroupInfo"

  /group/set_group_info:
    post:
      tags: [Group]
      summary: Update group info
      security: [{tokenAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupInfo:
                  $ref: "#/components/schemas/GroupInfo"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /group/get_group_info:
    post:
      tags: [Group]
      summary: Get group info
